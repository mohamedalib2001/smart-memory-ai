services:
  app:
    container_name: rlk79hi5dxkm_app
    build: .
    restart: unless-stopped
    ports:
      - 3000:3000
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./data:/app/data
  db:
    image: postgres:16-alpine
    container_name: rlk79hi5dxkm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - rlk79hi5dxkm_db_data:/var/lib/postgresql/data
networks:
  default:
    name: rlk79hi5dxkm_net
volumes:
  rlk79hi5dxkm_db_data:
